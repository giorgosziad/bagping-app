# BagPing - cloud build (Codemagic). Builds iOS + Android from this Capacitor repo.
workflows:
  android:
    name: BagPing Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.bionectech.bagping"
      node: 22
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Patch iBeacon plugin for modern Gradle
        script: |
          f=node_modules/cordova-plugin-ibeacon/src/android/cordova-plugin-ibeacon.gradle
          if [ -f "$f" ]; then
            sed -i.bak "s/compile /implementation /g; s/compile(/implementation(/g; s/2\.16\.1/2.19.6/g" "$f"
            echo "=== patched $f ==="; cat "$f"
          fi
      - name: Enable Jetifier (bridge old plugin to AndroidX)
        script: |
          cd android
          grep -q "android.useAndroidX=true" gradle.properties || echo "android.useAndroidX=true" >> gradle.properties
          grep -q "android.enableJetifier=true" gradle.properties || echo "android.enableJetifier=true" >> gradle.properties
          cd ..
      - name: Build debug APK (compile check - no signing needed)
        script: |
          cd android
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 || /usr/libexec/java_home)
          echo "Using JAVA_HOME=$JAVA_HOME"
          chmod +x ./gradlew || true
          sh ./gradlew assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.apk

  ios:
    name: BagPing iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BagPing ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bionectech.bagping
      vars:
        BUNDLE_ID: "com.bionectech.bagping"
        TEAM_ID: "6CL7W8TL88"
      node: 22
      xcode: latest
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Pin signing into project (SPM fix)
        script: |
          echo "=== profiles Codemagic set up ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(none yet)"
          python3 - <<'PYEOF'
          import glob, os, re, subprocess, plistlib
          profs = glob.glob(os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles/*.mobileprovision"))
          if not profs:
              print("No profile on disk yet - relying on Codemagic ios_signing.")
          else:
              name = plistlib.loads(subprocess.check_output(["security","cms","-D","-i",profs[0]]))["Name"]
              print("Pinning profile:", name)
              pbx = "ios/App/App.xcodeproj/project.pbxproj"
              s = open(pbx).read()
              s = re.sub(r'\s*DEVELOPMENT_TEAM = [^;]+;', '', s)
              s = re.sub(r'\s*PROVISIONING_PROFILE_SPECIFIER = [^;]+;', '', s)
              repl = ('CODE_SIGN_STYLE = Manual;\n'
                      '\t\t\t\tDEVELOPMENT_TEAM = 6CL7W8TL88;\n'
                      '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "%s";\n'
                      '\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";' % name)
              s = re.sub(r'CODE_SIGN_STYLE = \w+;', repl, s)
              open(pbx,"w").write(s)
              print("pbxproj pinned to profile")
          PYEOF
      - name: Build IPA (SPM project, no CocoaPods)
        script: |
          xcode-project build-ipa --project "ios/App/App.xcodeproj" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
