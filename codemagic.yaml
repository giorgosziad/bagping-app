# BagPing - cloud build (Codemagic). Builds iOS + Android from this Capacitor repo.
# Signing/credentials are configured in the Codemagic UI (see README).
workflows:
  android:
    name: BagPing Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.bionectech.bagping"
      node: 22
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Patch iBeacon plugin for modern Gradle
        script: |
          f=node_modules/cordova-plugin-ibeacon/src/android/cordova-plugin-ibeacon.gradle
          if [ -f "$f" ]; then
            sed -i.bak "s/compile /implementation /g; s/compile(/implementation(/g; s/2\.16\.1/2.19.6/g" "$f"
            echo "=== patched $f ==="; cat "$f"
          else
            echo "plugin gradle not found (path may differ)"; find node_modules/cordova-plugin-ibeacon -name "*.gradle"
          fi
      - name: Enable Jetifier (bridge old plugin to AndroidX)
        script: |
          cd android
          grep -q "android.useAndroidX=true" gradle.properties || echo "android.useAndroidX=true" >> gradle.properties
          grep -q "android.enableJetifier=true" gradle.properties || echo "android.enableJetifier=true" >> gradle.properties
          echo "--- gradle.properties ---"; cat gradle.properties
          cd ..
      - name: Build debug APK (compile check - no signing needed)
        script: |
          cd android
          export JAVA_HOME=$(/usr/libexec/java_home -v 21 || /usr/libexec/java_home)
          echo "Using JAVA_HOME=$JAVA_HOME"; "$JAVA_HOME/bin/java" -version
          chmod +x ./gradlew || true
          sh ./gradlew assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"
    artifacts:
      - android/app/build/outputs/**/*.apk

  ios:
    name: BagPing iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BagPing ASC      # App Store Connect API key added in Codemagic UI
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bionectech.bagping
      vars:
        BUNDLE_ID: "com.bionectech.bagping"
      node: 22
      xcode: latest
    scripts:
      - name: Install JS deps
        script: npm ci || npm install
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA (SPM project, no CocoaPods)
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
